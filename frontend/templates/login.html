{% extends "base.html" %}
{% block title %}Connexion — CampusGive{% endblock %}

{% block content %}
<h1>Connexion</h1>
<p>Pas encore de compte&nbsp;? <a href="{{ url_for('auth.register') }}">Inscris-toi</a>.</p>

<form action="{{ url_for('auth.login') }}" method="post" novalidate>
  <div class="field">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" value="{{ email }}" required autocomplete="email">
  </div>
  <div class="field">
    <label for="password">Mot de passe</label>
    <input type="password" id="password" name="password" required autocomplete="current-password">
  </div>
  <button type="submit" class="btn">Se connecter</button>
</form>
{% endblock %}
